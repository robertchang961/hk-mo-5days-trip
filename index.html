<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>香港澳門五日遊 🇭🇰🇲🇴</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      color: #fff;
      max-width: 480px;
      width: 100%;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    p {
      color: #94a3b8;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }
    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    a.card {
      display: block;
      padding: 1.25rem 1.5rem;
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    a.card:active { transform: scale(0.97); }
    a.card .sub {
      font-size: 0.8rem;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 0.25rem;
    }
    .card-slide {
      background: linear-gradient(135deg, #e44d26, #f16529);
      box-shadow: 0 4px 20px rgba(228,77,38,0.4);
    }
    .card-report {
      background: linear-gradient(135deg, #0077b6, #00b4d8);
      box-shadow: 0 4px 20px rgba(0,119,182,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇭🇰 香港澳門五日遊 🇲🇴</h1>
    <p>2025 母親節之旅 · 05/09 – 05/13</p>
    <div class="cards">
      <a class="card card-slide" href="%E9%A6%99%E6%B8%AF%E6%BE%B3%E9%96%80%E4%BA%94%E6%97%A5%E9%81%8A-slide.html">
        🎴 行程投影片
        <div class="sub">Slide — 快速瀏覽每日行程</div>
      </a>
      <a class="card card-report" href="%E9%A6%99%E6%B8%AF%E6%BE%B3%E9%96%80%E4%BA%94%E6%97%A5%E9%81%8A-report.html">
        📋 完整行程報告
        <div class="sub">Report — 詳細景點、餐廳與時間表</div>
      </a>
    </div>
  </div>
</body>
</html>
